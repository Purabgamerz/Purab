<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
        }
        nav a {
            color: #fff;
            padding: 14px 20px;
            text-decoration: none;
            text-transform: uppercase;
        }
        nav a:hover {
            background-color: #555;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .shop-item {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            margin: 10px;
            flex: 1;
        }
        .shop-item img {
            max-width: 100%;
            height: auto;
        }
        .shop-item h2 {
            font-size: 1.5em;
            margin: 0.5em 0;
        }
        .shop-item p {
            color: #666;
        }
        .shop-item button {
            background-color: #28a745;
            border: none;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .shop-item button:hover {
            background-color: #218838;
        }
        .flex-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Minecraft Server Shop</h1>
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#shop">Shop</a>
        <a href="#contact">Contact</a>
        <a href="#AboutUs">About Us</a>
    </nav>
    <div class="container">
        <section id="shop">
            <h2>SERVER RANKS</h2>
            <div class="flex-container">
                <div class="shop-item">
                    <img src="path_to_image_1.jpg" alt="Item 1">
                    <h2>Coal Rank</h2>
                    <p>Price = $0.99/m</p>
                    <button>Buy Now</button>
                </div>
                <div class="shop-item">
                    <img src="path_to_image_2.jpg" alt="Item 2">
                    <h2>Iron Rank</h2>
                    <p>Price = $1.49/m</p>
                    <button>Buy Now</button>
                </div>
                <div class="shop-item">
                    <img src="path_to_image_3.jpg" alt="Item 3">
                    <h2>Item 3</h2>
                    <p>Price =  $2.99/m</p>
                    <button>Buy Now</button>
                </div>
            </div>
        </section>
    </div>
    <footer>
        <p>&copy; 2024 Minecraft Server Shop</p>
    </footer>
</body>
</html>
